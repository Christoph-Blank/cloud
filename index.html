<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.dropzone{
border:2px dashed #3b82f6;
border-radius:12px;
padding:40px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

.dropzone:hover{
background:#1e293b;
}

.file{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

button{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.download{background:#22c55e;color:black;}
.delete{background:#ef4444;color:white;}
.copy{background:#3b82f6;color:white;}

.progress{
height:6px;
background:#334155;
border-radius:4px;
overflow:hidden;
margin-top:5px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}

@media(max-width:600px){

.file{
flex-direction:column;
align-items:flex-start;
gap:6px;
}

}

</style>
</head>

<body>

<header>☁️ My Cloud</header>

<div class="container">

<div class="dropzone" id="dropzone">
Drag & Drop Dateien oder Ordner hier<br>
oder klicken zum auswählen
</div>

<input type="file" id="fileInput" multiple hidden>
<input type="file" id="folderInput" webkitdirectory multiple hidden>

<div id="progress"></div>

<h3>Dateien</h3>

<div id="fileList"></div>

</div>

<script>

const supabaseUrl="DEINE_SUPABASE_URL";
const supabaseKey="DEIN_ANON_KEY";

const client=supabase.createClient(supabaseUrl,supabaseKey);

const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("fileInput");
const folderInput=document.getElementById("folderInput");

dropzone.onclick=()=>fileInput.click();

dropzone.addEventListener("dragover",(e)=>{
e.preventDefault();
});

dropzone.addEventListener("drop",(e)=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener("change",(e)=>{
handleFiles(e.target.files);
});

folderInput.addEventListener("change",(e)=>{
uploadFolder(e.target.files);
});

async function handleFiles(files){

for(const file of files){

await uploadFile(file,file.name);

}

loadFiles();

}

async function uploadFolder(files){

for(const file of files){

let path=file.webkitRelativePath || file.name;

path=path
.replace(/\s+/g,"_")
.replace(/[^a-zA-Z0-9_\-\/\.]/g,"");

await uploadFile(file,path);

}

loadFiles();

}

async function uploadFile(file,path){

const progress=document.createElement("div");

progress.innerHTML=`
${path}
<div class="progress">
<div class="bar"></div>
</div>
`;

document.getElementById("progress").appendChild(progress);

const bar=progress.querySelector(".bar");

const {error}=await client.storage
.from("files")
.upload(path,file,{upsert:true});

bar.style.width="100%";

if(error){
alert("Upload Fehler: "+error.message);
console.error(error);
}

}

async function loadFiles(){

const {data}=await client.storage
.from("files")
.list("",{limit:100});

const list=document.getElementById("fileList");
list.innerHTML="";

data.forEach(file=>{

const div=document.createElement("div");

div.className="file";

div.innerHTML=`
<span>${file.name}</span>

<div>

<button class="download" onclick="downloadFile('${file.name}')">
Download
</button>

<button class="copy" onclick="copyLink('${file.name}')">
Link
</button>

<button class="delete" onclick="deleteFile('${file.name}')">
Delete
</button>

</div>
`;

list.appendChild(div);

});

}

function downloadFile(name){

const {data}=client.storage
.from("files")
.getPublicUrl(name);

window.open(data.publicUrl);

}

function copyLink(name){

const {data}=client.storage
.from("files")
.getPublicUrl(name);

navigator.clipboard.writeText(data.publicUrl);

alert("Link kopiert");

}

async function deleteFile(name){

if(!confirm("Datei löschen?")) return;

await client.storage
.from("files")
.remove([name]);

loadFiles();

}

loadFiles();

</script>

</body>
</html>
