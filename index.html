<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mini Cloud Modern</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: #f8fafc;
  display: flex;
  justify-content: center;
  padding: 50px 20px;
}

.container {
  width: 600px;
  max-width: 100%;
  background: #1e293b;
  padding: 30px 40px;
  border-radius: 16px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  font-weight: 700;
  color: #3b82f6;
}

.upload {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  align-items: center;
}

input[type="file"] {
  flex: 1;
  padding: 12px 15px;
  border-radius: 12px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #f8fafc;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input[type="file"]:hover {
  border-color: #3b82f6;
  box-shadow: 0 0 8px rgba(59,130,246,0.5);
}

button {
  background: #3b82f6;
  border: none;
  padding: 12px 20px;
  color: white;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.3s, transform 0.2s;
}

button:hover {
  background: #2563eb;
  transform: translateY(-2px);
}

.file {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #334155;
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 12px;
  transition: background 0.2s;
}

.file:hover {
  background: #475569;
}

.download {
  background: #22c55e;
  border: none;
  padding: 8px 14px;
  border-radius: 10px;
  color: #0f172a;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}

.download:hover {
  background: #16a34a;
  transform: translateY(-2px);
}

@media(max-width: 640px){
  .upload {
    flex-direction: column;
  }
  button {
    width: 100%;
  }
  input[type="file"] {
    width: 100%;
  }
}
</style>

</head>
<body>

<div class="container">

<h1>☁️ My Modern Cloud</h1>

<div class="upload">
  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload</button>
</div>

<div id="fileList"></div>

</div>

<script>
const supabaseUrl = "https://tsuboribhcsporomvjeu.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdWJvcmliaGNzcG9yb212amV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTc1MjQsImV4cCI6MjA4ODY5MzUyNH0.GMWCUbfjiMb_HMM5JG38ZvaB7qBh_tfFoGDE6zEduJ0";
const client = supabase.createClient(supabaseUrl, supabaseKey);

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  if(!file){ alert("Bitte Datei auswählen"); return; }

  const { error } = await client.storage
    .from("files")
    .upload(file.name, file, { upsert: true });

  if(error){
    alert("Upload Fehler: " + error.message);
    console.log(error);
  } else {
    alert("Upload erfolgreich!");
    loadFiles();
  }
}

async function loadFiles(){
  const { data, error } = await client.storage.from("files").list();
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  data.forEach(file => {
    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      <span>${file.name}</span>
      <button class="download" onclick="downloadFile('${file.name}')">Download</button>
    `;

    list.appendChild(div);
  });
}

function downloadFile(name){
  const { data } = client.storage.from("files").getPublicUrl(name);
  window.open(data.publicUrl);
}

loadFiles();
</script>

</body>
</html>
