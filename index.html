<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.dropzone{
border:2px dashed #3b82f6;
border-radius:12px;
padding:40px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

.dropzone:hover{
background:#1e293b;
}

.buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.upload{background:#3b82f6;color:white;}
.folder{background:#8b5cf6;color:white;}
.download{background:#22c55e;color:black;}
.copy{background:#3b82f6;color:white;}
.delete{background:#ef4444;color:white;}

.file{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.progress{
height:6px;
background:#334155;
border-radius:4px;
overflow:hidden;
margin-top:4px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}

@media(max-width:600px){

.file{
flex-direction:column;
align-items:flex-start;
gap:6px;
}

.buttons{
flex-direction:column;
}

}

</style>

</head>

<body>

<header>☁️ My Cloud</header>

<div class="container">

<div class="dropzone" id="dropzone">
Drag & Drop Dateien hier
</div>

<div class="buttons">

<button class="upload" onclick="fileInput.click()">
Dateien hochladen
</button>

<button class="folder" onclick="folderInput.click()">
Ordner hochladen
</button>

</div>

<input type="file" id="fileInput" multiple hidden>
<input type="file" id="folderInput" webkitdirectory multiple hidden>

<div id="progressContainer"></div>

<h3>Dateien</h3>

<div id="fileList"></div>

</div>

<script>

const supabaseUrl="https://tsuboribhcsporomvjeu.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdWJvcmliaGNzcG9yb212amV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTc1MjQsImV4cCI6MjA4ODY5MzUyNH0.GMWCUbfjiMb_HMM5JG38ZvaB7qBh_tfFoGDE6zEduJ0";

const client=supabase.createClient(supabaseUrl,supabaseKey);

const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("fileInput");
const folderInput=document.getElementById("folderInput");

fileInput.addEventListener("change",(e)=>{
uploadFiles(e.target.files);
});

folderInput.addEventListener("change",(e)=>{
uploadFolder(e.target.files);
});

dropzone.addEventListener("dragover",(e)=>{
e.preventDefault();
});

dropzone.addEventListener("drop",(e)=>{
e.preventDefault();
uploadFiles(e.dataTransfer.files);
});

async function uploadFiles(files){

for(const file of files){

await uploadFile(file,file.name);

}

loadFiles();

}

async function uploadFolder(files){

for(const file of files){

let path=file.webkitRelativePath || file.name;

path=path
.replace(/\s+/g,"_")
.replace(/[^a-zA-Z0-9_\-\/\.]/g,"");

await uploadFile(file,path);

}

loadFiles();

}

async function uploadFile(file,path){

const progress=document.createElement("div");

progress.innerHTML=`
${path}
<div class="progress">
<div class="bar"></div>
</div>
`;

document.getElementById("progressContainer").appendChild(progress);

const bar=progress.querySelector(".bar");

const {error}=await client.storage
.from("files")
.upload(path,file,{upsert:true});

bar.style.width="100%";

if(error){
alert("Upload Fehler: "+error.message);
console.error(error);
}

}

async function loadFiles(){

const {data}=await client.storage
.from("files")
.list("",{limit:100});

const list=document.getElementById("fileList");
list.innerHTML="";

data.forEach(file=>{

const div=document.createElement("div");
div.className="file";

div.innerHTML=`
<span>${file.name}</span>

<div>

<button class="download" onclick="downloadFile('${file.name}')">
Download
</button>

<button class="copy" onclick="copyLink('${file.name}')">
Link
</button>

<button class="delete" onclick="deleteFile('${file.name}')">
Delete
</button>

</div>
`;

list.appendChild(div);

});

}

function downloadFile(name){

const {data}=client.storage
.from("files")
.getPublicUrl(name);

window.open(data.publicUrl);

}

function copyLink(name){

const {data}=client.storage
.from("files")
.getPublicUrl(name);

navigator.clipboard.writeText(data.publicUrl);

alert("Link kopiert");

}

async function deleteFile(name){

if(!confirm("Datei löschen?")) return;

await client.storage
.from("files")
.remove([name]);

loadFiles();

}

loadFiles();

</script>

</body>

</html>
