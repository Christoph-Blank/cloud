<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:system-ui;
  background:#334155;
  color:white;
  margin:0;
}

header{
  background:#475569;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.path{
  margin-bottom:15px;
  font-size:14px;
  color:#e2e8f0;
}

.dropzone{
  border:2px dashed #60a5fa;
  border-radius:12px;
  padding:35px;
  text-align:center;
  cursor:pointer;
  margin-bottom:20px;
  background:#475569;
}

.dropzone:hover{
  background:#526377;
}

.file{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#475569;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.folder{
  cursor:pointer;
  font-weight:600;
}

button{
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  margin-left:4px;
}

.upload{background:#3b82f6;color:white;}
.folderbtn{background:#8b5cf6;color:white;}
.download{background:#22c55e;color:black;}
.copy{background:#3b82f6;color:white;}
.open{background:#0ea5e9;color:white;}
.delete{background:#ef4444;color:white;}

.progress{
  height:6px;
  background:#64748b;
  border-radius:4px;
  overflow:hidden;
  margin-top:4px;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
  transition: width 0.3s ease;
}

@media(max-width:600px){

.file{
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
}

}

</style>

</head>

<body>

<header>☁️ Family Cloud</header>

<div class="container">

<div class="path" id="path"></div>

<div class="dropzone" id="dropzone">
Drag & Drop Dateien hier
</div>

<button class="upload" onclick="fileInput.click()">Dateien hochladen</button>
<button class="folderbtn" onclick="folderInput.click()">Ordner hochladen</button>

<input type="file" id="fileInput" multiple hidden>
<input type="file" id="folderInput" webkitdirectory multiple hidden>

<div id="progressContainer"></div>

<h3>Dateien</h3>

<div id="fileList"></div>

</div>

<script>

const supabaseUrl="https://tsuboribhcsporomvjeu.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdWJvcmliaGNzcG9yb212amV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTc1MjQsImV4cCI6MjA4ODY5MzUyNH0.GMWCUbfjiMb_HMM5JG38ZvaB7qBh_tfFoGDE6zEduJ0";

const client=supabase.createClient(supabaseUrl,supabaseKey);

let currentPath="";

const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("fileInput");
const folderInput=document.getElementById("folderInput");

fileInput.addEventListener("change",(e)=>{
  uploadFiles(e.target.files);
});

folderInput.addEventListener("change",(e)=>{
  uploadFolder(e.target.files);
});

dropzone.addEventListener("dragover",(e)=>{
  e.preventDefault();
});

dropzone.addEventListener("drop",(e)=>{
  e.preventDefault();
  uploadFiles(e.dataTransfer.files);
});

function updatePath(){
  let text=currentPath=="" ? "/" : "/"+currentPath;
  document.getElementById("path").innerHTML=text;
}

async function uploadFiles(files){
  for(const file of files){
    let path=currentPath+file.name;
    await uploadFile(file,path);
  }
  loadFiles();
}

async function uploadFolder(files){
  for(const file of files){
    let path=currentPath+(file.webkitRelativePath || file.name);
    path=path.replace(/\s+/g,"_").replace(/[^a-zA-Z0-9_\-\/\.]/g,"");
    await uploadFile(file,path);
  }
  loadFiles();
}

async function uploadFile(file,path){

  // Fortschrittsanzeige erstellen
  const progress=document.createElement("div");
  progress.innerHTML=`
    ${path}
    <div class="progress">
      <div class="bar"></div>
    </div>
  `;
  document.getElementById("progressContainer").appendChild(progress);
  const bar=progress.querySelector(".bar");

  // Datei hochladen
  const {error}=await client.storage
    .from("files")
    .upload(path,file,{upsert:true});

  bar.style.width="100%";

  if(error){
    alert("Upload Fehler: "+error.message);
    console.error(error);
  }

  // Fortschrittsbalken nach kurzer Zeit ausblenden
  setTimeout(()=>{
    progress.remove();
  },800);

}

async function loadFiles(){
  updatePath();

  const {data}=await client.storage
    .from("files")
    .list(currentPath,{limit:100});

  const list=document.getElementById("fileList");
  list.innerHTML="";

  if(currentPath!=""){
    const up=document.createElement("div");
    up.className="file folder";
    up.innerHTML="⬅️ Zurück";
    up.onclick=()=>{
      currentPath=currentPath.split("/").slice(0,-2).join("/");
      if(currentPath!="") currentPath+="/";
      loadFiles();
    };
    list.appendChild(up);
  }

  data.forEach(item=>{
    const div=document.createElement("div");
    div.className="file";

    if(item.id==null){ // Ordner
      div.classList.add("folder");
      div.innerHTML=`📂 ${item.name}`;
      div.onclick=()=>{
        currentPath+=item.name+"/";
        loadFiles();
      };
    }else{ // Datei
      div.innerHTML=`
        <span>${item.name}</span>
        <div>
          <button class="download" onclick="downloadFile('${currentPath+item.name}')">Download</button>
          <button class="copy" onclick="copyLink('${currentPath+item.name}')">Link</button>
          <button class="open" onclick="openFile('${currentPath+item.name}')">Öffnen</button>
          <button class="delete" onclick="deleteFile('${currentPath+item.name}')">Löschen</button>
        </div>
      `;
    }

    list.appendChild(div);
  });
}

function downloadFile(path){
  const {data}=client.storage
    .from("files")
    .getPublicUrl(path);
  window.open(data.publicUrl);
}

function copyLink(path){
  const {data}=client.storage
    .from("files")
    .getPublicUrl(path);
  navigator.clipboard.writeText(data.publicUrl);
  alert("Link kopiert");
}

function openFile(path){
  const {data}=client.storage
    .from("files")
    .getPublicUrl(path);
  window.open(data.publicUrl,"_blank");
}

async function deleteFile(path){
  if(!confirm("Datei löschen?")) return;
  await client.storage
    .from("files")
    .remove([path]);
  loadFiles();
}

loadFiles();

</script>

</body>
</html>
