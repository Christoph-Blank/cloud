<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: system-ui;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

header{
background:#1e293b;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.dropzone{
border:2px dashed #3b82f6;
border-radius:12px;
padding:30px;
text-align:center;
margin-bottom:20px;
}

.file{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

button{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.download{background:#22c55e;color:black;}
.delete{background:#ef4444;color:white;}
.copy{background:#3b82f6;color:white;}

.progress{
height:6px;
background:#334155;
border-radius:4px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
}

@media(max-width:600px){
.file{
flex-direction:column;
align-items:flex-start;
gap:8px;
}
}

</style>
</head>

<body>

<header>☁️ My Cloud</header>

<div class="container">

<div class="dropzone" id="dropzone">
Drag & Drop Dateien hier oder klicken
<input type="file" id="fileInput" multiple hidden>
</div>

<div id="progressContainer"></div>

<div id="fileList"></div>

</div>

<script>

const supabaseUrl="DEINE_URL";
const supabaseKey="DEIN_ANON_KEY";

const client=supabase.createClient(supabaseUrl,supabaseKey);

const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("fileInput");

dropzone.onclick=()=>fileInput.click();

dropzone.addEventListener("dragover",(e)=>{
e.preventDefault();
dropzone.style.background="#1e293b";
});

dropzone.addEventListener("dragleave",()=>{
dropzone.style.background="transparent";
});

dropzone.addEventListener("drop",(e)=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener("change",(e)=>{
handleFiles(e.target.files);
});

async function handleFiles(files){

for(const file of files){

const progressDiv=document.createElement("div");

progressDiv.innerHTML=`
${file.name}
<div class="progress">
<div class="progress-bar"></div>
</div>
`;

document.getElementById("progressContainer").appendChild(progressDiv);

const bar=progressDiv.querySelector(".progress-bar");

const {error}=await client.storage
.from("files")
.upload(file.name,file,{upsert:true});

bar.style.width="100%";

if(error){
console.error(error);
alert("Upload Fehler: "+error.message);
}

}

loadFiles();
}

async function loadFiles(){

const {data}=await client.storage
.from("files")
.list();

const list=document.getElementById("fileList");
list.innerHTML="";

data.forEach(file=>{

const div=document.createElement("div");
div.className="file";

div.innerHTML=`
<span>${file.name}</span>

<div>
<button class="download" onclick="downloadFile('${file.name}')">Download</button>
<button class="copy" onclick="copyLink('${file.name}')">Link</button>
<button class="delete" onclick="deleteFile('${file.name}')">Delete</button>
</div>
`;

list.appendChild(div);

});

}

function downloadFile(name){

const {data}=client.storage
.from("files")
.getPublicUrl(name);

window.open(data.publicUrl);

}

async function deleteFile(name){

if(!confirm("Datei löschen?")) return;

await client.storage
.from("files")
.remove([name]);

loadFiles();

}

function copyLink(name){

const {data}=client.storage
.from("files")
.getPublicUrl(name);

navigator.clipboard.writeText(data.publicUrl);

alert("Link kopiert");

}

loadFiles();

</script>

</body>
</html>
